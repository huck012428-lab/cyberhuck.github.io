/* ============================================================
   HELIX / PROTEIN SVG — hero visual
   ============================================================ */
function HelixCanvas(){
  // A double helix made of two sinusoidal strands + rungs.
  // Intentional: reads as DNA *and* as a data flow.
  const W = 560, H = 640;
  const strands = 2;
  const turns = 5;
  const samples = 140;
  const amplitude = 120;

  const strand = (phase) => {
    let d = "";
    for(let i=0;i<=samples;i++){
      const t = i/samples;
      const y = t * H;
      const x = W/2 + Math.sin(t * Math.PI * 2 * turns + phase) * amplitude;
      d += (i===0 ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1) + " ";
    }
    return d;
  };
  const rungs = [];
  const rungCount = 44;
  for(let i=0;i<rungCount;i++){
    const t = (i+0.5)/rungCount;
    const y = t * H;
    const x1 = W/2 + Math.sin(t * Math.PI * 2 * turns) * amplitude;
    const x2 = W/2 + Math.sin(t * Math.PI * 2 * turns + Math.PI) * amplitude;
    rungs.push({x1,y,x2, key:i, t});
  }

  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-full helix-float" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="strandA" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0" stopColor="var(--bio)" stopOpacity="0.2"/>
          <stop offset="0.5" stopColor="var(--bio)" stopOpacity="1"/>
          <stop offset="1" stopColor="var(--bio)" stopOpacity="0.2"/>
        </linearGradient>
        <linearGradient id="strandB" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0" stopColor="var(--ice)" stopOpacity="0.15"/>
          <stop offset="0.5" stopColor="var(--ice)" stopOpacity="0.8"/>
          <stop offset="1" stopColor="var(--ice)" stopOpacity="0.15"/>
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="2.4" />
        </filter>
      </defs>

      {/* rungs */}
      {rungs.map(r => (
        <line key={r.key} x1={r.x1} y1={r.y} x2={r.x2} y2={r.y}
          stroke="var(--line)" strokeWidth="0.8"
          opacity={0.25 + 0.5*Math.abs(Math.sin(r.t*Math.PI*turns*2))}
        />
      ))}
      {/* strands glow */}
      <g filter="url(#glow)" opacity="0.6">
        <path d={strand(0)} stroke="url(#strandA)" strokeWidth="2.2" fill="none" />
        <path d={strand(Math.PI)} stroke="url(#strandB)" strokeWidth="2.0" fill="none" />
      </g>
      {/* strands crisp */}
      <path d={strand(0)} stroke="url(#strandA)" strokeWidth="1.2" fill="none" />
      <path d={strand(Math.PI)} stroke="url(#strandB)" strokeWidth="1.0" fill="none" />

      {/* base pair dots */}
      {rungs.map(r=>(
        <g key={"d"+r.key}>
          <circle cx={r.x1} cy={r.y} r="2.2" fill="var(--bio)"/>
          <circle cx={r.x2} cy={r.y} r="1.8" fill="var(--ice)"/>
        </g>
      ))}

      {/* measurement ticks */}
      {[0.15,0.38,0.62,0.85].map((t,i)=>(
        <g key={"m"+i} transform={`translate(40, ${t*H})`}>
          <line x1="0" x2="12" y1="0" y2="0" stroke="var(--ink-3)" strokeWidth="1"/>
          <text x="18" y="4" fill="var(--ink-3)" fontSize="9" fontFamily="JetBrains Mono">
            {["N-term","α-helix","β-sheet","C-term"][i]}
          </text>
        </g>
      ))}
    </svg>
  );
}

function Ticker({items, show}){

  const loop = [...items, ...items];
  return (
    <div className="h-full overflow-hidden relative" style={{maskImage:"linear-gradient(to bottom, transparent, black 10%, black 90%, transparent)", WebkitMaskImage:"linear-gradient(to bottom, transparent, black 10%, black 90%, transparent)"}}>
      <div className="ticker-column font-mono text-[11px] flex flex-col gap-2">
        {loop.map((t, i) => {
          const kind = i % 3;
          return (
            <div key={i} className="flex items-center gap-2">
              <span className={kind===0?"text-bio":kind===1?"text-ice":"text-warn"}>●</span>
              <span className="text-ink-2 whitespace-nowrap">{t}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ProjectGlyph({id}){
  // Unique mini-diagram per project.
  const common = { width:64, height:64, viewBox:"0 0 64 64" };
  if(id==="01"){
    // parallel corpus — two lanes of dots
    return (
      <svg {...common}>
        {[...Array(6)].map((_,i)=>(
          <g key={i}>
            <circle cx={8+i*10} cy="22" r="2" fill="var(--bio)"/>
            <circle cx={8+i*10} cy="42" r="2" fill="var(--ice)"/>
            <line x1={8+i*10} y1="22" x2={8+i*10} y2="42" stroke="var(--line)"/>
          </g>
        ))}
      </svg>
    );
  }
  if(id==="02"){
    // KG — nodes and edges
    const nodes = [[32,10],[12,28],[52,28],[20,54],[44,54],[32,36]];
    const edges = [[0,1],[0,2],[1,3],[2,4],[1,5],[2,5],[3,5],[4,5]];
    return (
      <svg {...common}>
        {edges.map(([a,b],i)=>(
          <line key={i} x1={nodes[a][0]} y1={nodes[a][1]} x2={nodes[b][0]} y2={nodes[b][1]} stroke="var(--line)"/>
        ))}
        {nodes.map((n,i)=>(
          <circle key={i} cx={n[0]} cy={n[1]} r={i===5?3.5:2.5} fill={i===5?"var(--bio)":"var(--ink-2)"}/>
        ))}
      </svg>
    );
  }
  if(id==="03"){
    // crawler — nested squares + arrow
    return (
      <svg {...common}>
        <rect x="10" y="10" width="44" height="44" fill="none" stroke="var(--line)"/>
        <rect x="18" y="18" width="28" height="28" fill="none" stroke="var(--line)"/>
        <rect x="26" y="26" width="12" height="12" fill="var(--bio)" opacity="0.6"/>
        <path d="M8 32 L56 32" stroke="var(--ice)" strokeWidth="1" strokeDasharray="2 3"/>
      </svg>
    );
  }
  // 04 RLHF — preference bars
  return (
    <svg {...common}>
      {[22,14,28,10].map((h,i)=>(
        <rect key={i} x={8+i*12} y={52-h} width="8" height={h} fill={i===0?"var(--bio)":"var(--ink-3)"}/>
      ))}
      <path d="M6 54 L58 54" stroke="var(--line)"/>
    </svg>
  );
}

function FakeQR(){
  // Deterministic pseudo-QR, decorative only.
  const N = 21;
  const cells = useMemo(()=>{
    const arr=[];
    let seed = 7;
    const rand = ()=> { seed = (seed*9301+49297) % 233280; return seed/233280; };
    for(let y=0;y<N;y++){
      for(let x=0;x<N;x++){
        arr.push(rand() > 0.52 ? 1 : 0);
      }
    }
    return arr;
  },[]);
  const corner = (x,y) => (x<7 && y<7) || (x>=N-7 && y<7) || (x<7 && y>=N-7);
  return (
    <svg viewBox="0 0 220 220" className="w-full max-w-[240px]">
      <rect width="220" height="220" fill="var(--bg)" rx="4"/>
      {cells.map((v,i)=>{
        const x=i%N, y=(i/N|0);
        if(corner(x,y)) return null;
        if(!v) return null;
        return <rect key={i} x={14+x*9} y={14+y*9} width="7" height="7" fill="var(--ink)"/>;
      })}
      {/* finder patterns */}
      {[[14,14],[14+14*9,14],[14,14+14*9]].map(([fx,fy],i)=>(
        <g key={i}>
          <rect x={fx} y={fy} width="63" height="63" fill="none" stroke="var(--ink)" strokeWidth="9"/>
          <rect x={fx+18} y={fy+18} width="27" height="27" fill="var(--ink)"/>
        </g>
      ))}
      {/* bio accent */}
      <rect x={14+10*9} y={14+10*9} width="20" height="20" fill="var(--bio)"/>
    </svg>
  );
}

/* ============================================================
   TWEAKS
   ============================================================ */
function Tweaks({tweaks, setTweaks}){
  const [open, setOpen] = useState(true);
  const [edit, setEdit] = useState(false);

  useEffect(()=>{
    // apply accent hue live
    document.documentElement.style.setProperty('--bio', `oklch(0.84 0.17 ${tweaks.accentHue})`);
  },[tweaks.accentHue]);

  useEffect(()=>{
    const handler = (e)=>{
      if(!e.data) return;
      if(e.data.type === '__activate_edit_mode') setEdit(true);
      if(e.data.type === '__deactivate_edit_mode') setEdit(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return ()=> window.removeEventListener('message', handler);
  },[]);

  const set = (k, v)=>{
    const next = {...tweaks, [k]: v};
    setTweaks(next);
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]: v}}, '*');
  };

  if(!edit) return null;

  return (
    <div className="tweaks-panel" style={{display: open?"block":"none"}}>
      <div className="flex items-center justify-between mb-3">
        <div className="text-ink">Tweaks</div>
        <button onClick={()=>setOpen(false)} className="text-ink-3 hover:text-ink">×</button>
      </div>
      <label>
        <span>Accent hue</span>
        <input type="range" min="80" max="280" step="1"
               value={tweaks.accentHue}
               onChange={e=>set('accentHue', +e.target.value)} />
      </label>
      <label>
        <span>Grid</span>
        <input type="checkbox" checked={tweaks.showGrid} onChange={e=>set('showGrid', e.target.checked)}/>
      </label>
      <label>
        <span>Hero ticker</span>
        <input type="checkbox" checked={tweaks.showTicker} onChange={e=>set('showTicker', e.target.checked)}/>
      </label>
      <div className="mt-3 text-ink-3">hue = {tweaks.accentHue}</div>
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
function App(){
  const defaults = JSON.parse(document.getElementById('tweak-defaults').textContent.replace(/\/\*EDITMODE-(BEGIN|END)\*\//g,''));
  const [tweaks, setTweaks] = useState(defaults);

  useEffect(()=>{
    document.documentElement.style.setProperty('--bio', `oklch(0.84 0.17 ${tweaks.accentHue})`);
  },[]);

  return (
    <div className="relative">
      <Nav/>
      <Hero tweaks={tweaks}/>
      <About/>
      <Stack/>
      <Projects/>
      <Timeline/>
      <Contact/>
      <Tweaks tweaks={tweaks} setTweaks={setTweaks}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
